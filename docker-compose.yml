services:
  db:
    image: postgres:17-alpine
    container_name: leadflow_postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "${POSTGRES_PORT}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
  db_test:
    image: postgres:17-alpine
    container_name: leadflow_postgres_test
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: leadflow_test_db

    ports:
      - "5433:5432"

    tmpfs:
      - /var/lib/postgresql/data
volumes:
  postgres_data: