services:
  db:
    image: postgres:17-alpine
    container_name: leadflow_postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "${POSTGRES_PORT}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: leadflow_api
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432

    ports:
      - "8001:8000"

    depends_on:
      db:
        condition: service_healthy

    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 5s
      timeout: 5s
      retries: 10

  n8n:
    image: n8nio/n8n:2.29.7
    container_name: leadflow_n8n
    restart: unless-stopped

    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_RUNNERS_ENABLED: "true"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_SECURE_COOKIE: "false"
      WEBHOOK_URL: http://localhost:5678/
      GENERIC_TIMEZONE: Africa/Casablanca
      TZ: Africa/Casablanca

    ports:
      - "5678:5678"

    volumes:
      - n8n_data:/home/node/.n8n

    depends_on:
      app:
        condition: service_healthy

  db_test:
    image: postgres:17-alpine
    container_name: leadflow_postgres_test
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: leadflow_test_db

    ports:
      - "5433:5432"

    tmpfs:
      - /var/lib/postgresql/data


volumes:
  postgres_data:
  n8n_data: